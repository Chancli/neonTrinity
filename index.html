<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050510">
    <title>Neon Trinity - Google IO Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4285F4;
            --danger: #EA4335;
            --success: #34A853;
            --warning: #FBBC05;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050510; font-family: 'Google Sans', sans-serif; }
        #gameCanvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* UI OVERLAYS */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom)); z-index: 10; }
        .score-display { color: #fff; font-size: 32px; text-shadow: 0 0 15px var(--primary); font-family: 'Orbitron', sans-serif; font-weight: bold; margin-top: 40px; transition: text-shadow 0.3s;}
        .hints { display: flex; justify-content: space-between; width: 100%; color: rgba(255, 255, 255, 0.4); font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px;}
        
        /* CONTROL DE VOLUMEN FLOTANTE (CANVAS) */
        .floating-vol { position: absolute; top: max(20px, env(safe-area-inset-top)); right: 20px; z-index: 1000; display: flex; align-items: center; gap: 10px; pointer-events: auto; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .floating-vol span { font-size: 14px; color: #fff; }
        input[type="range"] { -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.3); height: 4px; border-radius: 2px; outline: none; width: 80px; cursor: pointer; touch-action: auto; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        /* MENUS (Glassmorphism) */
        .menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 16, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 100; pointer-events: auto; transition: opacity 0.4s ease; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 60px 20px; overflow-y: auto; }
        .hidden { opacity: 0; pointer-events: none; z-index: 0; }
        
        h1 { color: #fff; font-size: 42px; margin: 0 0 20px; text-align: center; line-height: 1.1; font-family: 'Orbitron', sans-serif; letter-spacing: 2px;}
        h1 span { color: var(--danger); font-size: 24px; letter-spacing: 8px; display: block; margin-top: 5px; font-family: 'Google Sans', sans-serif; font-weight: 700; transition: color 0.3s;}
        
        .status-box { width: 100%; max-width: 320px; border-left: 4px solid var(--success); background: rgba(255, 255, 255, 0.05); border-radius: 0 8px 8px 0; color: #e0e0e0; padding: 12px 15px; margin-bottom: 25px; font-family: monospace; font-size: 12px; transition: border-color 0.3s;}
        .section-title { width: 100%; max-width: 320px; text-align: left; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; margin-top: 10px;}
        
        button { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 14px 20px; font-size: 14px; font-family: 'Google Sans', sans-serif; font-weight: bold; cursor: pointer; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; width: 100%; max-width: 320px; transition: all 0.2s; position: relative; overflow: hidden;}
        button:active { transform: scale(0.97); }
        button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
        
        .btn-primary { background: var(--primary); border: none; color: #fff; box-shadow: 0 0 15px var(--primary); transition: background 0.3s, box-shadow 0.3s; }
        .btn-primary:hover { opacity: 0.9; border: none; box-shadow: 0 0 20px var(--primary); }
        .btn-radio { border-color: var(--success); color: var(--success); transition: border-color 0.3s, color 0.3s;}
        .btn-danger { border-color: var(--danger); color: var(--danger); transition: border-color 0.3s, color 0.3s;}
        .btn-file { border-color: var(--warning); color: var(--warning); transition: border-color 0.3s, color 0.3s;}
        
        #urlInput, #nameInput { width: 100%; max-width: 320px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px; margin-bottom: 10px; border-radius: 8px; font-family: monospace; font-size: 14px; outline: none; transition: border 0.3s;}
        #urlInput:focus, #nameInput:focus { border-color: var(--primary); }

        .orbit-selector { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 320px; }
        .orbit-btn { flex: 1; padding: 12px 0; margin: 0; border-radius: 8px; text-align: center; }
        .orbit-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); transition: all 0.3s;}

        .theme-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 320px; }
        .theme-btn { height: 45px; border: 2px solid transparent; border-radius: 8px; cursor: pointer; opacity: 0.5; transition: 0.3s; margin: 0;}
        .theme-btn.active { opacity: 1; transform: translateY(-2px); border-color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .theme-io26 { background: linear-gradient(45deg, #4285F4, #EA4335, #FBBC05, #34A853); }
        .theme-cyan { background: linear-gradient(45deg, #001122, #00ffff); }
        .theme-crimson { background: linear-gradient(45deg, #220000, #ff0055); }
        .theme-gold { background: linear-gradient(45deg, #221100, #ffd700); }
        
        /* LEADERBOARD LOCAL */
        .leaderboard-container { width: 100%; max-width: 320px; margin-top: 10px; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px;}
        .leaderboard-item { display: flex; justify-content: space-between; font-size: 14px; color: #ccc; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 0; font-family: 'Orbitron', monospace; }
        .leaderboard-item:last-child { border-bottom: none; }
        .leaderboard-item:first-child { color: var(--warning); font-weight: bold; text-shadow: 0 0 10px var(--warning); transition: color 0.3s, text-shadow 0.3s; }
        
        #submitScoreArea { width: 100%; max-width: 320px; display: flex; gap: 10px; margin-bottom: 20px; }
        #nameInput { width: 60%; margin: 0; text-align: center; text-transform: uppercase; font-family: 'Orbitron'; font-size: 18px; letter-spacing: 4px;}
        #submitScoreBtn { width: 40%; margin: 0; font-size: 12px; padding: 12px 10px;}

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        #gameOverTitle { color: var(--danger); text-shadow: 0 0 20px var(--danger); transition: all 0.3s; }
        #finalScore { color: var(--warning); transition: color 0.3s; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- CONTROL DE VOLUMEN FLOTANTE (SIEMPRE VISIBLE) -->
    <div class="floating-vol">
        <span>🔊</span>
        <input type="range" id="volSliderCanvas" min="0" max="1" step="0.05" value="0.5" title="Volumen General">
    </div>

    <div class="ui-layer">
        <div>
            <div class="score-display">SCORE: <span id="scoreEl">0</span></div>
        </div>
        <div class="hints"><span>&lt; Mitad Izquierda</span><span>Mitad Derecha &gt;</span></div>
    </div>

    <!-- MAIN MENU -->
    <div id="startMenu" class="menu-screen">
        <h1>NEON<br><span>TRINITY '26</span></h1>
        <div class="status-box" id="startMsg">SISTEMA: ONLINE.<br>Controles táctiles de panel dividio.</div>
        
        <div class="section-title">ÓRBITAS ACTIVAS</div>
        <div class="orbit-selector">
            <button class="orbit-btn" id="orb2">2</button>
            <button class="orbit-btn active" id="orb3">3</button>
            <button class="orbit-btn" id="orb4">4</button>
        </div>

        <div class="section-title">AUDIO REACTIVO (WEB AUDIO API)</div>
        <input type="file" id="fileInput" accept="audio/*" style="display:none;">
        <button id="loadBtn" class="btn-file">📁 CARGAR MP3 LOCAL</button>
        
        <div style="display:flex; gap:10px; width:100%; max-width:320px; margin-top: 10px;">
            <button id="radio1Btn" class="btn-radio" style="flex:1;">📻 Gaming</button>
            <button id="radio2Btn" class="btn-radio" style="flex:1;">📻 Phonk</button>
            <button id="radio3Btn" class="btn-danger" style="flex:1;">📻 Bass+</button>
        </div>

        <button id="startBtn" class="btn-primary" style="margin-top: 30px; font-size: 16px; padding: 16px;">INICIAR SECUENCIA</button>
        <button id="settingsBtn">⚙️ AJUSTES Y LDM</button>
    </div>

    <!-- SETTINGS MENU -->
    <div id="settingsMenu" class="menu-screen hidden">
        <h1>SISTEMA<br><span>AJUSTES</span></h1>
        
        <div class="section-title" style="margin-top: 10px;">TEMA DE COLOR</div>
        <div class="theme-selector">
            <div class="theme-btn theme-io26 active" data-theme="io26"></div>
            <div class="theme-btn theme-cyan" data-theme="cyan"></div>
            <div class="theme-btn theme-crimson" data-theme="crimson"></div>
            <div class="theme-btn theme-gold" data-theme="gold"></div>
        </div>

        <div class="section-title" style="margin-top: 10px;">RENDIMIENTO</div>
        <button id="ldmBtn" class="btn-radio" style="margin-bottom: 20px;">LDM: DESACTIVADO</button>

        <button id="closeSettingsBtn" class="btn-primary" style="margin-top: auto;">🏠 VOLVER AL MENÚ</button>
    </div>

    <!-- GAME OVER MENU -->
    <div id="gameOverMenu" class="menu-screen hidden">
        <h1 id="gameOverTitle">SISTEMA<br><span style="color:#fff; text-shadow:none;">CAÍDO</span></h1>
        
        <div style="font-size: 24px; color: #fff; margin: 10px 0 20px; font-family: 'Orbitron';">SCORE FINAL: <span id="finalScore">0</span></div>
        
        <div id="submitScoreArea">
            <input type="text" id="nameInput" placeholder="DEV" maxlength="3">
            <button id="submitScoreBtn" class="btn-primary">GUARDAR</button>
        </div>

        <div class="section-title">LEADERBOARD LOCAL (SESIÓN)</div>
        <div id="leaderboardList" class="leaderboard-container">
            <!-- Items generados en JS -->
        </div>
        
        <button id="restartBtn" class="btn-primary" style="margin-top: 10px;">REINTENTAR PISTA</button>
        <button id="homeBtn">🏠 MENÚ PRINCIPAL</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d', { alpha: false }); 
            
            const ui = {
                startMenu: document.getElementById('startMenu'), settingsMenu: document.getElementById('settingsMenu'),
                gameOverMenu: document.getElementById('gameOverMenu'), scoreEl: document.getElementById('scoreEl'),
                finalScoreEl: document.getElementById('finalScore'), startMsg: document.getElementById('startMsg'),
                startBtn: document.getElementById('startBtn'), restartBtn: document.getElementById('restartBtn'),
                settingsBtn: document.getElementById('settingsBtn'), closeSettingsBtn: document.getElementById('closeSettingsBtn'),
                homeBtn: document.getElementById('homeBtn'), loadBtn: document.getElementById('loadBtn'),
                fileInput: document.getElementById('fileInput'), radio1Btn: document.getElementById('radio1Btn'),
                radio2Btn: document.getElementById('radio2Btn'), radio3Btn: document.getElementById('radio3Btn'),
                orbBtns: [document.getElementById('orb2'), document.getElementById('orb3'), document.getElementById('orb4')],
                themeBtns: document.querySelectorAll('.theme-btn'), nameInput: document.getElementById('nameInput'),
                submitScoreBtn: document.getElementById('submitScoreBtn'), leaderboardList: document.getElementById('leaderboardList'),
                submitScoreArea: document.getElementById('submitScoreArea'), ldmBtn: document.getElementById('ldmBtn'),
                volSliderCanvas: document.getElementById('volSliderCanvas')
            };
            
            let gameState = 'MENU', score = 0, frames = 0, W, H, CX, CY;
            let animationId;
            let laneCount = 3;
            let radii = [], baseRadii = [];
            let screenShake = 0; 
            
            const THEMES = {
                io26: { player: '#4285F4', enemy: '#EA4335', jumper: '#34A853', coin: '#FBBC05', shadow: '#4285F4' },
                cyan: { player: '#00ffff', enemy: '#ff0055', jumper: '#ffaa00', coin: '#ffff00', shadow: '#00ffff' },
                crimson: { player: '#ffffff', enemy: '#ff0000', jumper: '#ffaaaa', coin: '#ffffff', shadow: '#ff0000' },
                gold: { player: '#ffd700', enemy: '#cccccc', jumper: '#ff4500', coin: '#ffd700', shadow: '#ffd700' }
            };
            let config = { theme: 'io26', colors: THEMES['io26'], ldm: false, volume: 0.5 };

            const aiDb = {intro:["Filtros listos.", "Conexión a GCP establecida."], win:["Sincronía."], fail:["Kernel Panic.", "Excepción no controlada."]};
            const RADIOS = { gaming: "https://stream.zeno.fm/0r0xa792kwzuv", trap: "https://stream.zeno.fm/f3wvbbqmdg8uv", bass: "https://bassdrive.radioca.st/;" };

            // --- AUDIO ENGINE ---
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            let actx, analyser, dataArray, sourceNode, audioEl, filterNode, masterGain;
            let globalAudioBuffer = null;
            let noiseBuffer = null; // Buffer para el Hi-Hat
            let kickVisual = 0, beatDetected = false, isMusicLoaded = false;
            let beatHeat = 0, framesSinceSpawn = 0, pendingSpawn = false;
            let energyHistory = [], prevSpectrum = null;
            let lastBeatTime = 0;

            const audio = {
                init: () => { 
                    if(!actx) {
                        actx = new AudioContext();
                        masterGain = actx.createGain();
                        masterGain.connect(actx.destination);
                        masterGain.gain.value = config.volume; 
                        ui.volSliderCanvas.value = config.volume;

                        // Generador de Ruido Blanco para el Hi-Hat
                        const bufferSize = actx.sampleRate * 0.1; // 100 milisegundos
                        noiseBuffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
                        const output = noiseBuffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            output[i] = Math.random() * 2 - 1;
                        }
                    } 
                    if(actx.state === 'suspended') actx.resume(); 
                },
                playSfx: (f, t, d, vol=0.1) => {
                    if(!actx) return;
                    const o = actx.createOscillator(), g = actx.createGain();
                    o.type = t; o.frequency.setValueAtTime(f, actx.currentTime);
                    if(t==='sawtooth') o.frequency.exponentialRampToValueAtTime(f/2, actx.currentTime + d); 
                    
                    g.gain.setValueAtTime(vol, actx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + d);
                    o.connect(g); g.connect(masterGain); 
                    o.start(); o.stop(actx.currentTime + d);
                },
                jump: (u) => {
                    if(!actx) return;
                    const o = actx.createOscillator(), g = actx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(u ? 160 : 110, actx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(10, actx.currentTime + 0.15); 
                    g.gain.setValueAtTime(0.3, actx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.15);
                    o.connect(g); g.connect(masterGain);
                    o.start(); o.stop(actx.currentTime + 0.15);
                },
                coin: () => {
                    // Diseño Hi-Hat analógico (Ruido blanco + Highpass Filter)
                    if(!actx || !noiseBuffer) return;
                    const noise = actx.createBufferSource();
                    noise.buffer = noiseBuffer;
                    
                    const filter = actx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 7000; // Cortar frecuencias graves/medias (crispy hat)
                    
                    const gain = actx.createGain();
                    gain.gain.setValueAtTime(0.5, actx.currentTime); // Fuerte al inicio
                    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.08); // Caída hiper rápida
                    
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(masterGain);
                    
                    noise.start();
                },
                crash: () => audio.playSfx(150, 'sawtooth', 0.5, 0.2),
                reset: () => { 
                    if(sourceNode) { try{sourceNode.disconnect(); if(sourceNode.stop) sourceNode.stop();}catch(e){} }
                    if(audioEl) { audioEl.pause(); audioEl.src = ""; audioEl.remove(); audioEl = null; }
                    isMusicLoaded = false; energyHistory = [];
                },
                handleFileSelect: (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    audio.init(); audio.reset();
                    ui.loadBtn.innerText = "PROCESANDO...";
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        actx.decodeAudioData(ev.target.result, function(buffer) {
                            globalAudioBuffer = buffer; isMusicLoaded = true;
                            ui.loadBtn.innerText = "▶️ " + file.name.substring(0,12)+"...";
                        }, () => { ui.loadBtn.innerText = "ERROR DE LECTURA"; });
                    };
                    reader.readAsArrayBuffer(file);
                },
                playRadio: (url, btn) => {
                    audio.init(); audio.reset(); globalAudioBuffer = null; 
                    ui.startMsg.innerText = "Haciendo fetch al stream...";
                    audioEl = new Audio(); audioEl.crossOrigin = "anonymous"; audioEl.src = url;
                    sourceNode = actx.createMediaElementSource(audioEl);
                    setupAudioGraph(sourceNode);
                    audioEl.play().then(() => { 
                        isMusicLoaded = true; ui.startMsg.innerHTML = "STREAM CONECTADO 📡<br>Listo para jugar."; 
                        document.querySelectorAll('.btn-radio, .btn-danger').forEach(b => b.style.opacity = 0.5);
                        btn.style.opacity = 1;
                    }).catch(e => { ui.startMsg.innerText = "ERROR CORS/STREAM."; });
                },
                startPlayback: () => { 
                    if (globalAudioBuffer) {
                        if (sourceNode) try { sourceNode.stop(); sourceNode.disconnect(); } catch(e) {}
                        sourceNode = actx.createBufferSource(); sourceNode.buffer = globalAudioBuffer; sourceNode.loop = true;
                        setupAudioGraph(sourceNode); sourceNode.start(0);
                    } else if (audioEl) { audioEl.play(); }
                },
                stopPlayback: () => { if(sourceNode && sourceNode.buffer) try{sourceNode.stop();}catch(e){} if(audioEl) audioEl.pause(); },
                analyze: () => {
                    if (!analyser) return;
                    analyser.getByteFrequencyData(dataArray);
                    const now = actx.currentTime;
                    
                    let sumSquares = 0; 
                    for(let i = 0; i < 10; i++) sumSquares += dataArray[i] * dataArray[i];
                    const rms = Math.sqrt(sumSquares / 10);

                    let flux = 0;
                    if (prevSpectrum) {
                        for (let i = 0; i < 15; i++) {
                            let diff = dataArray[i] - prevSpectrum[i];
                            if (diff > 0) flux += diff;
                        }
                    }
                    prevSpectrum = new Uint8Array(dataArray);

                    const combinedScore = (rms * 0.4) + (flux * 0.6);
                    energyHistory.push(combinedScore);
                    if (energyHistory.length > 100) energyHistory.shift();

                    const sortedHistory = [...energyHistory].sort((a, b) => a - b);
                    const threshold = Math.max(sortedHistory[Math.floor(0.85 * sortedHistory.length)] || 0, 40) * 1.15;

                    if (combinedScore > threshold && (now - lastBeatTime > 0.08)) {
                        beatDetected = true; lastBeatTime = now; beatHeat = Math.min(beatHeat + 0.2, 0.8);
                        if(!config.ldm) screenShake = Math.min(screenShake + 2, 8); 
                    } else { beatDetected = false; }
                    
                    beatHeat *= 0.92;
                    const targetVisual = Math.min(rms / 200, 1.0); 
                    kickVisual += (targetVisual - kickVisual) * 0.3;
                }
            };

            function setupAudioGraph(source) {
                filterNode = actx.createBiquadFilter(); filterNode.type = "lowpass"; filterNode.frequency.value = 200;
                analyser = actx.createAnalyser(); analyser.fftSize = 256;
                
                source.connect(filterNode); 
                filterNode.connect(analyser); 
                analyser.connect(masterGain); 
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }

            // --- LOCAL LEADERBOARD ---
            let localScores = JSON.parse(localStorage.getItem('io_scores')) || [];
            
            function loadLeaderboard() {
                ui.leaderboardList.innerHTML = '';
                localScores.sort((a, b) => b.score - a.score);
                if (localScores.length === 0) {
                    ui.leaderboardList.innerHTML = '<div class="leaderboard-item" style="justify-content:center;">Sin registros aún.</div>';
                } else {
                    localScores.slice(0, 5).forEach((s, i) => {
                        const div = document.createElement('div');
                        div.className = 'leaderboard-item';
                        div.innerHTML = `<span>${i+1}. ${s.name}</span><span>${s.score}</span>`;
                        ui.leaderboardList.appendChild(div);
                    });
                }
            }

            function saveScore() {
                const name = ui.nameInput.value.toUpperCase().substring(0, 3).replace(/[^A-Z0-9]/g, '') || "DEV";
                if(score <= 0) return;
                
                localScores.push({name, score});
                localStorage.setItem('io_scores', JSON.stringify(localScores));
                
                ui.submitScoreBtn.innerText = "¡GUARDADO!";
                ui.submitScoreBtn.disabled = true;
                setTimeout(() => {
                    ui.submitScoreArea.style.display = 'none';
                    loadLeaderboard();
                }, 1000);
            }

            function loadConfig() {
                const saved = localStorage.getItem('neonConfigIO');
                if(saved) { 
                    const parsed = JSON.parse(saved); 
                    config.theme = parsed.theme || 'io26'; 
                    config.ldm = !!parsed.ldm; 
                    config.volume = parsed.volume !== undefined ? parsed.volume : 0.5;
                }
                applyTheme(config.theme);
                updateLdmUI();
                if(masterGain) masterGain.gain.value = config.volume;
                ui.volSliderCanvas.value = config.volume;
            }
            function saveConfig() { localStorage.setItem('neonConfigIO', JSON.stringify({ theme: config.theme, ldm: config.ldm, volume: config.volume })); }
            
            function applyTheme(name) {
                config.theme = name; config.colors = THEMES[name];
                
                // Actualizar Botones Activos
                ui.themeBtns.forEach(btn => { btn.classList.remove('active'); if(btn.dataset.theme === name) btn.classList.add('active'); });
                
                // MAGIA: Aplicar las variables CSS Globales
                const root = document.documentElement;
                root.style.setProperty('--primary', config.colors.player);
                root.style.setProperty('--danger', config.colors.enemy);
                root.style.setProperty('--success', config.colors.jumper);
                root.style.setProperty('--warning', config.colors.coin);
                
                updateLdmUI(); // Refrescar los colores del botón LDM
            }

            function updateLdmUI() {
                ui.ldmBtn.innerText = config.ldm ? "LDM: ACTIVADO (RÁPIDO)" : "LDM: DESACTIVADO (HERMOSO)";
                ui.ldmBtn.style.borderColor = config.ldm ? "var(--warning)" : "var(--success)";
                ui.ldmBtn.style.color = config.ldm ? "var(--warning)" : "var(--success)";
            }

            function updateRadii() {
                W = canvas.width; H = canvas.height; CX = W/2; CY = H/2;
                const m = Math.min(W,H); baseRadii = [];
                const startR = m * 0.15; const space = (m * 0.40 - startR) / (laneCount - 1 || 1); 
                for(let i=0; i<laneCount; i++) baseRadii.push(startR + (i * space));
                radii = [...baseRadii];
            }
            function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; updateRadii(); }
            window.addEventListener('resize',resize); resize();

            class Player {
                constructor(){ this.angle=0; this.lane= Math.floor(laneCount / 2); this.currR=radii[this.lane]; this.trail=[]; this.rotationSpeed=0.035; }
                update(){
                    this.rotationSpeed=0.035+(score*0.00004);
                    this.angle+=this.rotationSpeed;
                    const targetR = radii[this.lane];
                    this.currR += (targetR - this.currR) * 0.25;
                    this.x=CX+Math.cos(this.angle)*this.currR;
                    this.y=CY+Math.sin(this.angle)*this.currR;
                    this.trail.push({x:this.x,y:this.y});
                    if(this.trail.length>10) this.trail.shift();
                }
                move(d){
                    const old=this.lane; this.lane+=d;
                    if(this.lane < 0) this.lane = 0; if(this.lane >= laneCount) this.lane = laneCount - 1;
                    if(this.lane!==old) { audio.jump(d>0); createParticles(this.x, this.y, config.colors.player, 3); }
                }
                draw(){
                    ctx.strokeStyle=config.colors.player; ctx.lineWidth=5; ctx.lineCap='round'; ctx.lineJoin='round';
                    ctx.beginPath();
                    this.trail.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
                    ctx.stroke();
                    
                    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle + Math.PI);
                    ctx.fillStyle='#fff'; ctx.beginPath();
                    ctx.moveTo(0, -8); ctx.lineTo(6, 6); ctx.lineTo(-6, 6); ctx.closePath();
                    ctx.fill(); ctx.restore();
                }
            }
            
            let player, obstacles=[], coins=[], particles=[], lastEnemyLane=-1;

            function init(){
                cancelAnimationFrame(animationId);
                audio.init(); 
                if(isMusicLoaded) audio.startPlayback();
                score=0; frames=0; framesSinceSpawn=0; lastEnemyLane=-1; screenShake=0;
                ui.scoreEl.innerText=0; player=new Player(); obstacles=[]; coins=[]; particles=[];
                gameState='PLAYING'; 
                ui.startMenu.classList.add('hidden'); ui.gameOverMenu.classList.add('hidden');
                
                // Reiniciar botones de UI en caso de reintento
                ui.submitScoreBtn.disabled = false;
                ui.submitScoreBtn.innerText = "GUARDAR";
                ui.submitScoreArea.style.display = 'flex';
                
                loop();
            }
            
            function checkSpawn(){
                const MIN_RATE = 50, START_RATE = 120;
                const targetRate = Math.max(MIN_RATE, START_RATE - Math.floor(score/2));
                framesSinceSpawn++;
                if (framesSinceSpawn > targetRate) pendingSpawn = true;
                let doSpawn = false;
                if (pendingSpawn) {
                    if (isMusicLoaded) { if (beatDetected || framesSinceSpawn > targetRate + 30) doSpawn = true; } 
                    else { doSpawn = true; }
                }
                if (doSpawn) { spawnEnemy(); framesSinceSpawn = 0; pendingSpawn = false; }
            }

            function spawnEnemy() {
                const TRAVEL_TIME_FRAMES = 80; 
                const travelDistance = player.rotationSpeed * TRAVEL_TIME_FRAMES;
                const targetAngle = player.angle + travelDistance;
                if(coins.some(c => Math.abs(c.angle - targetAngle) < 0.5)) return;
                
                let lane=Math.floor(Math.random() * laneCount); 
                if(lastEnemyLane!==-1 && laneCount > 1 && Math.random() < 0.6) { 
                    while(lane === lastEnemyLane) lane=Math.floor(Math.random() * laneCount); 
                }
                lastEnemyLane=lane;
                const isJumper = (score > 10) && (Math.random() < 0.3) && (laneCount > 1);
                obstacles.push({ angle: targetAngle, lane: lane, currentRadius: radii[lane], active: true, jumpTimer: 0, isJumper: isJumper, originalLane: lane, jumpPhase: 0 });
            }

            function manageCoins(){
                if(coins.length===0 && Math.random() < 0.05){ 
                    const spawnAngle=player.angle+(Math.PI * 1.5);
                    const lanes = Array.from({length: laneCount}, (_, i) => i).sort(()=>Math.random()-0.5);
                    for(let lane of lanes){
                        const busy=obstacles.some(o=>o.active&&Math.abs(o.angle-spawnAngle)<0.5&&o.lane===lane);
                        if(!busy){ coins.push({angle:spawnAngle,lane:lane,active:true}); break; }
                    }
                }
            }
            
            function update(){
                if(gameState!=='PLAYING')return;
                frames++;
                if(isMusicLoaded) audio.analyze();
                
                let isBeat = isMusicLoaded ? beatDetected : (frames % 45 === 0);

                screenShake *= 0.9; 
                beatHeat *= 0.94;
                const expansion = kickVisual * 15; 
                radii = baseRadii.map(r => r + expansion);

                player.update(); checkSpawn(); manageCoins();
                
                obstacles.forEach(o => {
                    if(!o.active) return;
                    if(o.isJumper && isBeat && o.jumpTimer === 0){
                        if(o.jumpPhase === 0) { 
                            const possibleLanes = [];
                            if(o.lane > 0) possibleLanes.push(o.lane - 1);
                            if(o.lane < laneCount - 1) possibleLanes.push(o.lane + 1);
                            if(possibleLanes.length > 0) {
                                o.lane = possibleLanes[Math.floor(Math.random() * possibleLanes.length)];
                                const ex=CX+Math.cos(o.angle)*o.currentRadius, ey=CY+Math.sin(o.angle)*o.currentRadius;
                                createParticles(ex, ey, config.colors.jumper, 5); 
                                o.jumpPhase = 1; o.jumpTimer = 10; 
                            }
                        } else if(o.jumpPhase === 1) { 
                            o.lane = o.originalLane;
                            const ex=CX+Math.cos(o.angle)*o.currentRadius, ey=CY+Math.sin(o.angle)*o.currentRadius;
                            createParticles(ex, ey, config.colors.jumper, 5); 
                            o.jumpPhase = 2; o.jumpTimer = 10;
                        } else if(o.jumpPhase === 2) {
                            const ex=CX+Math.cos(o.angle)*o.currentRadius, ey=CY+Math.sin(o.angle)*o.currentRadius;
                            createParticles(ex, ey, config.colors.jumper, 15);
                            o.active = false;
                        }
                    }
                    if(o.jumpTimer > 0) o.jumpTimer--;
                    o.currentRadius += (radii[o.lane] - o.currentRadius) * 0.3; 
                });
                
                const SAFE_ZONE=Math.PI*2; 
                obstacles=obstacles.filter(e=>e.active&&(e.angle>player.angle-SAFE_ZONE));
                
                const checkHit=(e,isCoin)=>{
                    const r = isCoin ? radii[e.lane] : e.currentRadius; 
                    const ex=CX+Math.cos(e.angle)*r,ey=CY+Math.sin(e.angle)*r,dist=Math.hypot(player.x-ex,player.y-ey);
                    if(dist<15){ 
                        if(isCoin){
                            score+=5; ui.scoreEl.innerText=score; audio.coin(); 
                            createParticles(ex,ey,config.colors.coin, 12);
                            const idx=coins.indexOf(e);if(idx>-1)coins.splice(idx,1);
                        }else{
                            audio.crash(); 
                            screenShake = 25; 
                            createParticles(ex,ey, e.isJumper ? config.colors.jumper : config.colors.enemy, 30); 
                            gameOver(); e.active=false;
                        }
                    }
                };
                obstacles.forEach(o=>checkHit(o,false)); coins.forEach(c=>checkHit(c,true));
                
                particles.forEach(p=>{
                    p.vx *= 0.95; p.vy *= 0.95; 
                    p.x+=p.vx; p.y+=p.vy; p.life-=0.03;
                });
                particles=particles.filter(p=>p.life>0);
            }
            
            function createParticles(x,y,color, count=8){
                if (config.ldm) count = Math.ceil(count / 4);
                for(let i=0;i<count;i++){
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 2;
                    particles.push({x, y, color, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1});
                }
            }
            
            function draw(){
                ctx.fillStyle = '#050510'; ctx.fillRect(0,0,W,H);
                
                ctx.save();
                if(screenShake > 0.5 && !config.ldm) {
                    ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                }

                if (gameState === 'PLAYING' && beatHeat > 0.1 && !config.ldm) {
                    ctx.fillStyle = `rgba(66, 133, 244, ${beatHeat * 0.15})`; 
                    ctx.fillRect(0,0,W,H);
                }

                if(isMusicLoaded && analyser) {
                    const coreSize = 20 + (kickVisual * 25); 
                    
                    const bars = 32;
                    const step = Math.PI * 2 / bars;
                    ctx.lineWidth = 3;
                    for(let i=0; i<bars; i++) {
                        const val = dataArray[i*2] / 255.0; 
                        const barLength = val * 60;
                        const a = step * i + frames*0.01;
                        // Color Reactivo general basando un poco en el player pero multicolor
                        ctx.strokeStyle = `hsla(${120 + val*100}, 100%, 50%, ${val})`; 
                        ctx.beginPath();
                        ctx.moveTo(CX + Math.cos(a)*coreSize, CY + Math.sin(a)*coreSize);
                        ctx.lineTo(CX + Math.cos(a)*(coreSize + barLength), CY + Math.sin(a)*(coreSize + barLength));
                        ctx.stroke();
                    }

                    if (!config.ldm) {
                        const grd = ctx.createRadialGradient(CX, CY, 0, CX, CY, coreSize*2);
                        grd.addColorStop(0, config.colors.player);
                        grd.addColorStop(1, "rgba(0,0,0,0)");
                        ctx.fillStyle = grd;
                        ctx.beginPath(); ctx.arc(CX, CY, coreSize*2, 0, Math.PI*2); ctx.fill();
                    }
                    
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(CX, CY, coreSize * 0.6, 0, Math.PI*2); ctx.fill();
                }

                ctx.lineWidth=2;
                radii.forEach((r,i)=>{
                    ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);
                    const glow = 0.2 + (kickVisual * 0.3); 
                    ctx.strokeStyle = config.colors.shadow;
                    if (!config.ldm) { ctx.shadowBlur = kickVisual * 15; ctx.shadowColor = config.colors.shadow; }
                    ctx.globalAlpha = glow; 
                    if(player && i === player.lane) ctx.setLineDash([10, 10]); else ctx.setLineDash([]); 
                    ctx.stroke(); 
                    ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.setLineDash([]);
                });

                if(gameState==='PLAYING' || gameState === 'GAMEOVER'){
                    coins.forEach(c=>{
                        const r=radii[c.lane], ex=CX+Math.cos(c.angle)*r, ey=CY+Math.sin(c.angle)*r;
                        ctx.fillStyle=config.colors.coin;
                        if (!config.ldm) { ctx.shadowBlur=15; ctx.shadowColor=config.colors.coin; }
                        ctx.beginPath(); ctx.arc(ex,ey,4+(kickVisual*2),0,Math.PI*2); ctx.fill(); 
                        ctx.shadowBlur=0;
                        if (!config.ldm) {
                            ctx.strokeStyle=config.colors.coin; ctx.lineWidth=1;
                            ctx.beginPath(); ctx.arc(ex,ey,8+(Math.sin(frames*0.1)*3),0,Math.PI*2); ctx.stroke();
                        }
                    });
                    
                    obstacles.forEach(o=>{
                        if(!o.active)return;
                        const r=o.currentRadius; 
                        const ex=CX+Math.cos(o.angle)*r, ey=CY+Math.sin(o.angle)*r;
                        const color = o.isJumper ? config.colors.jumper : config.colors.enemy;
                        
                        ctx.fillStyle = color; 
                        if (!config.ldm) { ctx.shadowBlur = 10 + (kickVisual * 10); ctx.shadowColor = color; }
                        ctx.beginPath(); ctx.save(); ctx.translate(ex,ey); ctx.rotate(o.angle+Math.PI/4 + (frames*0.05)); 
                        
                        if(o.isJumper) {
                            const s = 10;
                            ctx.moveTo(0, -s); ctx.lineTo(s, s*0.8); ctx.lineTo(-s, s*0.8); ctx.closePath();
                        } else {
                            const s = 8 + (kickVisual * 3); ctx.rect(-s,-s,s*2,s*2);
                        }
                        ctx.restore(); ctx.fill(); ctx.shadowBlur = 0;
                    });
                    
                    if(gameState === 'PLAYING') {
                        if (!config.ldm) { ctx.shadowBlur=15; ctx.shadowColor=config.colors.player; }
                        player.draw(); 
                        ctx.shadowBlur=0;
                    }
                    
                    if (!config.ldm) ctx.globalCompositeOperation = 'lighter';
                    particles.forEach(p=>{
                        ctx.fillStyle=p.color; ctx.globalAlpha=p.life;
                        ctx.beginPath(); ctx.arc(p.x,p.y,3 + (p.life*2),0,Math.PI*2); ctx.fill();
                    });
                    ctx.globalAlpha=1;
                    if (!config.ldm) ctx.globalCompositeOperation = 'source-over';
                }
                
                ctx.restore(); 
            }
            
            function gameOver(){
                gameState='GAMEOVER';
                audio.stopPlayback();
                ui.finalScoreEl.innerText=score;
                ui.gameOverMenu.classList.remove('hidden');
                ui.submitScoreArea.style.display = 'flex';
                ui.submitScoreBtn.disabled = false;
                ui.submitScoreBtn.innerText = "GUARDAR";
                loadLeaderboard();
            }
            
            function loop(){ 
                if(gameState==='PLAYING' || particles.length > 0) {
                    animationId = requestAnimationFrame(loop); 
                }
                update(); 
                draw(); 
            }
            
            function processInputVector(dx, dy) {
                if(gameState!=='PLAYING') return;
                if(!isMusicLoaded) audio.init();
                
                const px = Math.cos(player.angle);
                const py = Math.sin(player.angle);
                const dot = dx * px + dy * py;
                
                if (dot < -0.15) player.move(-1); 
                else if (dot > 0.15) player.move(1); 
                else {
                    if (dx === -1) player.move(-1);
                    else if (dx === 1) player.move(1);
                    else if (dy === -1) player.move(-1);
                    else if (dy === 1) player.move(1);
                }
            }

            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                let dx = 0, dy = 0;
                
                if(k === 'arrowleft' || k === 'a') dx = -1;
                if(k === 'arrowright' || k === 'd') dx = 1;
                if(k === 'arrowup' || k === 'w') dy = -1;
                if(k === 'arrowdown' || k === 's') dy = 1;
                
                if(dx !== 0 || dy !== 0) processInputVector(dx, dy);
            });

            function handleTouchScreen(x) { 
                if(gameState!=='PLAYING') return; 
                if(!isMusicLoaded) audio.init(); 
                
                if (x < W / 2) player.move(-1);
                else player.move(1);
            }

            window.addEventListener('mousedown',e=> { 
                if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') handleTouchScreen(e.clientX); 
            });
            window.addEventListener('touchstart',e=>{
                if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT'||e.target.closest('.leaderboard-container')||e.target.closest('.floating-vol')) return;
                e.preventDefault(); handleTouchScreen(e.changedTouches[0].clientX);
            },{passive:false});
            
            const bind = (el, fn) => { if(el) { el.addEventListener('click', (e)=>{e.stopPropagation();fn();}); } };

            bind(ui.loadBtn, () => ui.fileInput.click());
            ui.fileInput.addEventListener('change', audio.handleFileSelect);
            
            bind(ui.radio1Btn, (e) => audio.playRadio(RADIOS.gaming, ui.radio1Btn));
            bind(ui.radio2Btn, (e) => audio.playRadio(RADIOS.trap, ui.radio2Btn));
            bind(ui.radio3Btn, (e) => audio.playRadio(RADIOS.bass, ui.radio3Btn));

            bind(ui.startBtn, init);
            bind(ui.restartBtn, init);
            bind(ui.homeBtn, () => { gameState = 'MENU'; ui.gameOverMenu.classList.add('hidden'); ui.startMenu.classList.remove('hidden'); audio.stopPlayback(); });
            bind(ui.settingsBtn, () => ui.settingsMenu.classList.remove('hidden'));
            bind(ui.closeSettingsBtn, () => { saveConfig(); ui.settingsMenu.classList.add('hidden'); });
            
            bind(ui.ldmBtn, () => { config.ldm = !config.ldm; updateLdmUI(); draw(); });
            
            ui.volSliderCanvas.addEventListener('input', (e) => {
                config.volume = parseFloat(e.target.value);
                if(masterGain) masterGain.gain.value = config.volume;
                saveConfig();
            });

            bind(ui.submitScoreBtn, saveScore);

            ui.orbBtns.forEach((btn, index) => {
                bind(btn, () => { ui.orbBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); laneCount = index + 2; updateRadii(); draw(); });
            });

            ui.themeBtns.forEach(btn => { bind(btn, () => { applyTheme(btn.dataset.theme); draw(); }); });

            loadConfig(); 
            updateRadii(); draw(); 
        });
    </script>
</body>
